name: Deploy MyEconomy

on:
  push:
    branches:
      - main 

jobs:
  despliegue:
    runs-on: self-hosted 

    steps:
      - name: 📥 Obtener último código del repositorio
        uses: actions/checkout@v4

      - name: 🚀 Desplegar con variables de entorno
        run: |
          
          # 1. Apagamos los contenedores anteriores
          docker-compose down
          
          # 2. Construimos y levantamos la nueva versión usando el código recién descargado
          docker-compose up -d --build